<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobilček Servis | Recenzije</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div data-include="header"></div>
  <main class="container page-space">
    <div class="page-hero small">
      <p class="eyebrow">Recenzije</p>
      <h1>Mnenja kupcev</h1>
      <p>Kupci lahko oddajo recenzijo. Lastnik lahko v demo načinu odklene odgovor z e-pošto <strong>francekleon26@gmail.com</strong>.</p>
    </div>

    <section class="content-grid reviews-layout">
      <article class="content-card">
        <h2>Dodaj recenzijo</h2>
        <form class="stack-form" onsubmit="site.submitReview(event)">
          <label>Ime<input required name="name" type="text" /></label>
          <label>E-pošta<input required name="email" type="email" /></label>
          <label>Ocena
            <select name="rating">
              <option value="5">5/5</option>
              <option value="4">4/5</option>
              <option value="3">3/5</option>
              <option value="2">2/5</option>
              <option value="1">1/5</option>
            </select>
          </label>
          <label>Komentar<textarea required name="comment" rows="5"></textarea></label>
          <button class="btn btn-primary" type="submit">Objavi recenzijo</button>
        </form>
      </article>

      <article class="content-card">
        <h2>Admin odgovor</h2>
        <p>Za demo admin dostop vpiši lastniški e-mail.</p>
        <div class="admin-login">
          <input id="adminEmail" type="email" placeholder="Vnesi admin e-pošto" />
          <button class="btn btn-secondary" onclick="site.unlockAdmin()">Odkleni</button>
        </div>
        <p id="adminStatus" class="game-status"></p>
      </article>
    </section>

    <section class="section">
      <div id="reviewsList" class="reviews-list"></div>
    </section>
  </main>
  <div data-include="footer"></div>
  <div id="cartDrawer" class="cart-drawer hidden"></div>
  <script src="assets/data.js"></script>
  <script src="assets/app.js"></script>
  <script>site.renderLayout('reviews'); site.renderReviews();</script>
</body>
</html>
